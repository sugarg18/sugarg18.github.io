<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Case of the Missing Cookies!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Comic Sans MS', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    min-height: 100vh;
    padding: 20px;
  }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { text-align: center; color: #6b3e26; font-size: 2.2em; margin-bottom: 5px; }
  .subtitle { text-align:center; color:#8a5a3a; margin-bottom: 25px; }
  .card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .card h2 { color:#d2691e; margin-bottom: 12px; }
  #clue-list li { margin: 10px 0; padding-left: 5px; line-height: 1.4; }
  .suspects { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:15px; }
  .suspect {
    background: #fff7ed;
    border: 3px solid #ffd7a8;
    border-radius: 16px;
    padding: 15px;
    text-align:center;
    cursor:pointer;
    transition: transform 0.15s, border-color 0.15s, opacity 0.2s;
  }
  .suspect:hover { transform: scale(1.05); border-color:#ff9d4d; }
  .suspect.selected { border-color:#e85d04; background:#ffe4c4; }
  .suspect.crossed { opacity: 0.35; text-decoration: line-through; }
  .emoji { font-size: 3em; }
  .facts-list { text-align:left; font-size:0.9em; color:#555; margin-top:8px; }
  button {
    background:#ff9d4d;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:1em;
    cursor:pointer;
    font-weight:bold;
    margin-top:15px;
    margin-right: 10px;
  }
  button:hover { background:#e85d04; }
  #result {
    display:none;
    font-size:1.1em;
    padding:20px;
    border-radius:16px;
    margin-top:15px;
    line-height: 1.6;
  }
  .win { background:#d4f7dc; color:#1a7431; }
  .lose { background:#ffd6d6; color:#a11d1d; }
</style>
</head>
<body>
<div class="wrap">
